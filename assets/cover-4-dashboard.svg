<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="db-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f9fb"/>
      <stop offset="100%" stop-color="#f1f0fe"/>
    </linearGradient>
    <linearGradient id="gauge-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="bar-green" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#16a34a"/>
    </linearGradient>
    <linearGradient id="bar-amber" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="bar-indigo" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </linearGradient>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="16" flood-color="#0000001a"/>
    </filter>
    <filter id="gauge-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#db-bg)"/>

  <!-- Subtle decorative circles top-right -->
  <circle cx="1160" cy="40" r="80" fill="#4f46e5" opacity="0.04"/>
  <circle cx="40" cy="380" r="100" fill="#7c3aed" opacity="0.04"/>

  <!-- ============ LEFT SIDE ============ -->

  <!-- Overline label -->
  <text x="72" y="116"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="11" font-weight="700" fill="#4f46e5" letter-spacing="4">AI RESUME OPTIMIZER</text>

  <!-- Main title -->
  <text x="72" y="175"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="48" font-weight="800" fill="#111827" letter-spacing="-1">简历优化</text>
  <text x="72" y="232"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="48" font-weight="800" fill="#4f46e5" letter-spacing="-1">评分助手</text>

  <!-- Description -->
  <text x="72" y="272"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="15" fill="#6b7280">上传简历，AI 从 5 个维度量化评估</text>
  <text x="72" y="293"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="15" fill="#6b7280">给出可操作的优化建议</text>

  <!-- Providers row -->
  <circle cx="82" cy="340" r="5" fill="#4f46e5"/>
  <text x="92" y="345"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">DeepSeek</text>
  <circle cx="170" cy="340" r="5" fill="#7c3aed"/>
  <text x="180" y="345"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">Kimi</text>
  <circle cx="228" cy="340" r="5" fill="#6d28d9"/>
  <text x="238" y="345"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">Gemini</text>

  <!-- ============ RIGHT CARD ============ -->
  <rect x="490" y="28" width="660" height="344" rx="20"
        fill="white" filter="url(#card-shadow)"/>

  <!-- Card header -->
  <rect x="490" y="28" width="660" height="52" rx="20" fill="#fafafa"/>
  <rect x="490" y="60" width="660" height="20" fill="#fafafa"/>
  <line x1="490" y1="80" x2="1150" y2="80" stroke="#e5e7eb" stroke-width="1"/>

  <text x="530" y="60"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" font-weight="600" fill="#111827">简历评分总览</text>

  <!-- Status dot -->
  <circle cx="1110" cy="54" r="5" fill="#22c55e"/>
  <text x="1122" y="59"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="11" fill="#22c55e">分析完成</text>

  <!-- ====== Score Gauge ====== -->
  <!-- Track circle -->
  <circle cx="660" cy="198" r="88" fill="none" stroke="#f3f4f6" stroke-width="14"/>
  <!-- Score arc: 8.5/10 = 85% of circumference -->
  <!-- Circumference = 2π*88 ≈ 552.9 → 85% ≈ 470 -->
  <circle cx="660" cy="198" r="88" fill="none"
          stroke="url(#gauge-grad)" stroke-width="14"
          stroke-linecap="round"
          stroke-dasharray="470 553"
          transform="rotate(-90 660 198)"
          filter="url(#gauge-glow)"/>

  <!-- Score text -->
  <text x="660" y="186" text-anchor="middle"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="52" font-weight="800" fill="#111827">8.5</text>
  <text x="660" y="212" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">综合评分</text>
  <text x="660" y="230" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="11" fill="#9ca3af">满分 10 分</text>

  <!-- ====== Dimension Bars (right of gauge) ====== -->
  <g transform="translate(790, 100)">
    <!-- Bar 1: 内容完整度 9/10 -->
    <text x="0" y="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="12" fill="#374151">内容完整度</text>
    <text x="310" y="16" text-anchor="end" font-family="'Arial',sans-serif"
          font-size="12" font-weight="700" fill="#16a34a">9/10</text>
    <rect x="0" y="22" width="310" height="6" rx="3" fill="#f3f4f6"/>
    <rect x="0" y="22" width="279" height="6" rx="3" fill="url(#bar-green)"/>

    <!-- Bar 2: 成果量化度 7/10 -->
    <text x="0" y="56" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="12" fill="#374151">成果量化度</text>
    <text x="310" y="56" text-anchor="end" font-family="'Arial',sans-serif"
          font-size="12" font-weight="700" fill="#d97706">7/10</text>
    <rect x="0" y="62" width="310" height="6" rx="3" fill="#f3f4f6"/>
    <rect x="0" y="62" width="217" height="6" rx="3" fill="url(#bar-amber)"/>

    <!-- Bar 3: 结构清晰度 9/10 -->
    <text x="0" y="96" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="12" fill="#374151">结构清晰度</text>
    <text x="310" y="96" text-anchor="end" font-family="'Arial',sans-serif"
          font-size="12" font-weight="700" fill="#16a34a">9/10</text>
    <rect x="0" y="102" width="310" height="6" rx="3" fill="#f3f4f6"/>
    <rect x="0" y="102" width="279" height="6" rx="3" fill="url(#bar-green)"/>

    <!-- Bar 4: 表达专业度 8/10 -->
    <text x="0" y="136" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="12" fill="#374151">表达专业度</text>
    <text x="310" y="136" text-anchor="end" font-family="'Arial',sans-serif"
          font-size="12" font-weight="700" fill="#4f46e5">8/10</text>
    <rect x="0" y="142" width="310" height="6" rx="3" fill="#f3f4f6"/>
    <rect x="0" y="142" width="248" height="6" rx="3" fill="url(#bar-indigo)"/>

    <!-- Bar 5: ATS友好度 8/10 -->
    <text x="0" y="176" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="12" fill="#374151">ATS 友好度</text>
    <text x="310" y="176" text-anchor="end" font-family="'Arial',sans-serif"
          font-size="12" font-weight="700" fill="#4f46e5">8/10</text>
    <rect x="0" y="182" width="310" height="6" rx="3" fill="#f3f4f6"/>
    <rect x="0" y="182" width="248" height="6" rx="3" fill="url(#bar-indigo)"/>
  </g>

  <!-- Card bottom: action buttons -->
  <line x1="490" y1="330" x2="1150" y2="330" stroke="#f3f4f6" stroke-width="1"/>
  <rect x="516" y="344" width="100" height="22" rx="11" fill="#eef2ff"/>
  <text x="566" y="359" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="11" fill="#4f46e5">复制结果</text>
  <rect x="628" y="344" width="100" height="22" rx="11" fill="#eef2ff"/>
  <text x="678" y="359" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="11" fill="#4f46e5">导出 MD</text>
</svg>
