<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="left-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#312e81"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
    <linearGradient id="accent-bar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <clipPath id="left-clip">
      <rect x="0" y="0" width="500" height="400"/>
    </clipPath>
  </defs>

  <!-- Right panel (white) -->
  <rect x="0" y="0" width="1200" height="400" fill="#fafafa"/>

  <!-- Right side subtle pattern: grid lines -->
  <g opacity="0.04" stroke="#4f46e5" stroke-width="1">
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="560" y1="0" x2="560" y2="400"/>
    <line x1="620" y1="0" x2="620" y2="400"/>
    <line x1="680" y1="0" x2="680" y2="400"/>
    <line x1="740" y1="0" x2="740" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="860" y1="0" x2="860" y2="400"/>
    <line x1="920" y1="0" x2="920" y2="400"/>
    <line x1="980" y1="0" x2="980" y2="400"/>
    <line x1="1040" y1="0" x2="1040" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
    <line x1="1160" y1="0" x2="1160" y2="400"/>
    <line x1="500" y1="60" x2="1200" y2="60"/>
    <line x1="500" y1="120" x2="1200" y2="120"/>
    <line x1="500" y1="180" x2="1200" y2="180"/>
    <line x1="500" y1="240" x2="1200" y2="240"/>
    <line x1="500" y1="300" x2="1200" y2="300"/>
    <line x1="500" y1="360" x2="1200" y2="360"/>
  </g>

  <!-- Left panel -->
  <rect x="0" y="0" width="500" height="400" fill="url(#left-bg)"/>

  <!-- Left diagonal slice -->
  <polygon points="460,0 500,0 500,400 420,400" fill="#4c1d95" opacity="0.5"/>
  <polygon points="480,0 500,0 500,400 440,400" fill="#5b21b6" opacity="0.3"/>

  <!-- Left decorative circles -->
  <circle cx="80" cy="80" r="180" fill="white" opacity="0.03"/>
  <circle cx="400" cy="340" r="140" fill="white" opacity="0.03"/>

  <!-- Left: large "AI" watermark -->
  <text x="30" y="300" font-family="'Arial Black','Arial',sans-serif"
        font-size="260" font-weight="900" fill="white" opacity="0.06">AI</text>

  <!-- Left: content -->
  <!-- Icon area -->
  <g transform="translate(60, 88)">
    <rect x="0" y="0" width="44" height="52" rx="6" fill="white" opacity="0.15"/>
    <line x1="10" y1="18" x2="34" y2="18" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="27" x2="34" y2="27" stroke="white" stroke-width="2" opacity="0.6"/>
    <line x1="10" y1="36" x2="24" y2="36" stroke="white" stroke-width="2" opacity="0.6"/>
    <!-- Spark -->
    <circle cx="54" cy="8" r="4" fill="#a78bfa"/>
    <line x1="54" y1="1" x2="54" y2="5" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="54" y1="11" x2="54" y2="15" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="47" y1="8" x2="51" y2="8" stroke="#a78bfa" stroke-width="1.5"/>
    <line x1="57" y1="8" x2="61" y2="8" stroke="#a78bfa" stroke-width="1.5"/>
  </g>

  <text x="60" y="190"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="46" font-weight="800" fill="white" letter-spacing="-1">AI 简历</text>
  <text x="60" y="248"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="46" font-weight="800" fill="white" letter-spacing="-1">优化助手</text>

  <!-- Left accent bar -->
  <rect x="60" y="270" width="60" height="3" fill="url(#accent-bar)" rx="2"/>

  <text x="60" y="306"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="14" fill="white" opacity="0.5" letter-spacing="1">AI-Powered Resume Optimizer</text>

  <!-- Right panel content -->
  <!-- Title -->
  <text x="570" y="105"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="3">FEATURES</text>

  <!-- Feature list with icons -->
  <!-- Feature 1 -->
  <rect x="570" y="125" width="32" height="32" rx="8" fill="#eef2ff"/>
  <text x="586" y="146" text-anchor="middle" font-size="16">📄</text>
  <text x="616" y="137"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="14" font-weight="600" fill="#111827">多格式简历解析</text>
  <text x="616" y="154"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="12" fill="#6b7280">PDF / DOCX / MD / TXT</text>

  <!-- Feature 2 -->
  <rect x="570" y="177" width="32" height="32" rx="8" fill="#eef2ff"/>
  <text x="586" y="198" text-anchor="middle" font-size="16">🤖</text>
  <text x="616" y="189"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="14" font-weight="600" fill="#111827">多模型 AI 分析</text>
  <text x="616" y="206"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="12" fill="#6b7280">DeepSeek · Kimi · Gemini</text>

  <!-- Feature 3 -->
  <rect x="570" y="229" width="32" height="32" rx="8" fill="#eef2ff"/>
  <text x="586" y="250" text-anchor="middle" font-size="16">📊</text>
  <text x="616" y="241"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="14" font-weight="600" fill="#111827">5 维度评分可视化</text>
  <text x="616" y="258"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="12" fill="#6b7280">量化评估 · 进度条展示</text>

  <!-- Feature 4 -->
  <rect x="570" y="281" width="32" height="32" rx="8" fill="#eef2ff"/>
  <text x="586" y="302" text-anchor="middle" font-size="16">🎯</text>
  <text x="616" y="293"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="14" font-weight="600" fill="#111827">JD 精准匹配</text>
  <text x="616" y="310"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="12" fill="#6b7280">粘贴职位描述 · 定向优化建议</text>

  <!-- Right bottom tag -->
  <rect x="570" y="340" width="100" height="24" rx="12" fill="#f3f4f6"/>
  <text x="620" y="356" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="11" fill="#6b7280">纯前端 · 无需后端</text>

  <!-- Divider between features cols -->
  <line x1="860" y1="100" x2="860" y2="360" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Second column -->
  <text x="910" y="105"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="3">TECH STACK</text>

  <text x="910" y="145"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">HTML + CSS + JavaScript</text>
  <text x="910" y="168"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">无框架 · 无构建工具</text>
  <text x="910" y="191"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">pdf.js · mammoth.js</text>
  <text x="910" y="214"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">marked.js · CDN 引入</text>

  <line x1="910" y1="234" x2="1140" y2="234" stroke="#e5e7eb" stroke-width="1"/>

  <text x="910" y="264"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" font-weight="700" fill="#4f46e5" letter-spacing="3">PRIVACY</text>
  <text x="910" y="294"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">API Key 仅存本地</text>
  <text x="910" y="314"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="13" fill="#6b7280">不经过任何第三方</text>
</svg>
