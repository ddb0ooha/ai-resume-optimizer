<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f8f7ff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="title1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg1)"/>

  <!-- Subtle corner accents -->
  <circle cx="0" cy="0" r="280" fill="#4f46e5" opacity="0.04"/>
  <circle cx="1200" cy="400" r="320" fill="#7c3aed" opacity="0.05"/>
  <circle cx="1200" cy="0" r="160" fill="#4f46e5" opacity="0.03"/>

  <!-- Top thin rule -->
  <rect x="0" y="0" width="1200" height="4" fill="url(#title1)"/>

  <!-- Center card area -->
  <rect x="200" y="70" width="800" height="260" rx="16" fill="white" opacity="0.6"/>

  <!-- Icon: document -->
  <g transform="translate(540, 110)">
    <rect x="0" y="0" width="36" height="44" rx="4" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.5"/>
    <line x1="8" y1="16" x2="28" y2="16" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="24" x2="28" y2="24" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
    <line x1="8" y1="32" x2="20" y2="32" stroke="#4f46e5" stroke-width="1.5" opacity="0.4"/>
    <!-- Sparkle -->
    <circle cx="46" cy="6" r="3" fill="#7c3aed" opacity="0.7"/>
    <line x1="46" y1="0" x2="46" y2="4" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="46" y1="8" x2="46" y2="12" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="40" y1="6" x2="44" y2="6" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
    <line x1="48" y1="6" x2="52" y2="6" stroke="#7c3aed" stroke-width="1" opacity="0.6"/>
  </g>

  <!-- Main title -->
  <text x="600" y="210" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="52" font-weight="800" letter-spacing="-1"
        fill="url(#title1)">AI 简历优化助手</text>

  <!-- Divider -->
  <line x1="460" y1="232" x2="740" y2="232" stroke="#4f46e5" stroke-width="0.75" opacity="0.2"/>

  <!-- Tagline -->
  <text x="600" y="262" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="17" fill="#6b7280" letter-spacing="1">
    上传简历  ·  AI 深度分析  ·  量化评分  ·  专业优化建议
  </text>

  <!-- Provider pills -->
  <rect x="354" y="290" width="100" height="28" rx="14" fill="#4f46e5" opacity="0.1"/>
  <text x="404" y="309" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" font-weight="600" fill="#4f46e5">DeepSeek</text>

  <rect x="466" y="290" width="72" height="28" rx="14" fill="#7c3aed" opacity="0.1"/>
  <text x="502" y="309" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" font-weight="600" fill="#7c3aed">Kimi</text>

  <rect x="550" y="290" width="80" height="28" rx="14" fill="#4f46e5" opacity="0.1"/>
  <text x="590" y="309" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" font-weight="600" fill="#4f46e5">Gemini</text>

  <!-- Right tag -->
  <circle cx="676" cy="305" r="2" fill="#d1d5db"/>
  <text x="720" y="309" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" fill="#9ca3af">纯前端 · 无后端</text>

  <!-- Bottom rule -->
  <rect x="0" y="396" width="1200" height="4" fill="url(#title1)" opacity="0.3"/>
</svg>
