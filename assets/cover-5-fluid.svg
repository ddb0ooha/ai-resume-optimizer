<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="fluid-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="40%" stop-color="#1e1346"/>
      <stop offset="100%" stop-color="#0c0826"/>
    </linearGradient>
    <linearGradient id="fluid-title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="50%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#ddd6fe"/>
    </linearGradient>
    <linearGradient id="glass-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.04)"/>
    </linearGradient>
    <filter id="blob1-blur">
      <feGaussianBlur stdDeviation="55"/>
    </filter>
    <filter id="blob2-blur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>
    <filter id="blob3-blur">
      <feGaussianBlur stdDeviation="45"/>
    </filter>
    <filter id="white-glow">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Deep background -->
  <rect width="1200" height="400" fill="url(#fluid-bg)"/>

  <!-- Fluid blobs -->
  <ellipse cx="160" cy="140" rx="200" ry="180" fill="#4338ca" opacity="0.55" filter="url(#blob1-blur)"/>
  <ellipse cx="400" cy="320" rx="220" ry="160" fill="#6d28d9" opacity="0.45" filter="url(#blob2-blur)"/>
  <ellipse cx="1050" cy="100" rx="240" ry="200" fill="#3730a3" opacity="0.50" filter="url(#blob1-blur)"/>
  <ellipse cx="900" cy="340" rx="200" ry="140" fill="#5b21b6" opacity="0.40" filter="url(#blob2-blur)"/>
  <ellipse cx="600" cy="50" rx="180" ry="120" fill="#1d4ed8" opacity="0.35" filter="url(#blob3-blur)"/>

  <!-- Noise texture overlay (subtle dot pattern) -->
  <rect width="1200" height="400" fill="none"
        style="background-image: radial-gradient(circle, rgba(255,255,255,0.015) 1px, transparent 1px)"
        opacity="0.3"/>

  <!-- Large background text -->
  <text x="-20" y="370" font-family="'Arial Black',sans-serif" font-size="320" font-weight="900"
        fill="white" opacity="0.025" letter-spacing="-10">AI</text>

  <!-- Subtle grid lines -->
  <g opacity="0.06" stroke="white" stroke-width="0.5">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
  </g>

  <!-- ====== Glass Card ====== -->
  <rect x="100" y="60" width="1000" height="280" rx="24"
        fill="url(#glass-grad)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- Card inner border highlight (top edge) -->
  <line x1="124" y1="61" x2="1076" y2="61" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>

  <!-- ====== Left column in card ====== -->

  <!-- Icon -->
  <g transform="translate(148, 104)">
    <rect x="0" y="0" width="44" height="52" rx="8" fill="rgba(255,255,255,0.1)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
    <line x1="10" y1="17" x2="34" y2="17" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="26" x2="34" y2="26" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <line x1="10" y1="35" x2="24" y2="35" stroke="white" stroke-width="1.5" opacity="0.7"/>
    <!-- AI spark -->
    <circle cx="54" cy="6" r="5" fill="#818cf8"/>
    <line x1="54" y1="0" x2="54" y2="3" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="54" y1="9" x2="54" y2="12" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="48" y1="6" x2="51" y2="6" stroke="#818cf8" stroke-width="1.5"/>
    <line x1="57" y1="6" x2="60" y2="6" stroke="#818cf8" stroke-width="1.5"/>
  </g>

  <!-- Main title -->
  <text x="148" y="216"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="52" font-weight="800" fill="url(#fluid-title)"
        filter="url(#white-glow)" letter-spacing="-1">AI 简历优化助手</text>

  <!-- Divider line -->
  <line x1="148" y1="234" x2="480" y2="234" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Tagline -->
  <text x="148" y="262"
        font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif"
        font-size="15" fill="rgba(255,255,255,0.55)" letter-spacing="0.5">
    上传简历 · AI 深度分析 · 量化评分 · 专业优化
  </text>

  <!-- Provider pills -->
  <rect x="148" y="288" width="92" height="26" rx="13"
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="194" y="305" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" fill="rgba(255,255,255,0.7)">DeepSeek</text>

  <rect x="250" y="288" width="60" height="26" rx="13"
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="280" y="305" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" fill="rgba(255,255,255,0.7)">Kimi</text>

  <rect x="320" y="288" width="68" height="26" rx="13"
        fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <text x="354" y="305" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" fill="rgba(255,255,255,0.7)">Gemini</text>

  <!-- ====== Right column: score preview ====== -->
  <line x1="620" y1="88" x2="620" y2="312" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

  <!-- Score circle -->
  <circle cx="740" cy="192" r="72" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="10"/>
  <circle cx="740" cy="192" r="72" fill="none"
          stroke="url(#fluid-title)" stroke-width="10" stroke-linecap="round"
          stroke-dasharray="384 452"
          transform="rotate(-90 740 192)"/>
  <text x="740" y="181" text-anchor="middle"
        font-family="'Arial','Helvetica',sans-serif"
        font-size="44" font-weight="800" fill="white">8.5</text>
  <text x="740" y="204" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="12" fill="rgba(255,255,255,0.45)">综合评分</text>
  <text x="740" y="220" text-anchor="middle"
        font-family="'PingFang SC','Microsoft YaHei',sans-serif"
        font-size="10" fill="rgba(255,255,255,0.3)">满分 10 分</text>

  <!-- Mini bars right of gauge -->
  <g transform="translate(852, 112)">
    <text x="0" y="14" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="rgba(255,255,255,0.45)">内容完整度</text>
    <rect x="0" y="20" width="222" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="20" width="200" height="4" rx="2" fill="#4ade80" opacity="0.8"/>

    <text x="0" y="50" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="rgba(255,255,255,0.45)">成果量化度</text>
    <rect x="0" y="56" width="222" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="56" width="155" height="4" rx="2" fill="#fbbf24" opacity="0.8"/>

    <text x="0" y="86" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="rgba(255,255,255,0.45)">结构清晰度</text>
    <rect x="0" y="92" width="222" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="92" width="200" height="4" rx="2" fill="#4ade80" opacity="0.8"/>

    <text x="0" y="122" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="rgba(255,255,255,0.45)">表达专业度</text>
    <rect x="0" y="128" width="222" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="128" width="178" height="4" rx="2" fill="#818cf8" opacity="0.8"/>

    <text x="0" y="158" font-family="'PingFang SC','Microsoft YaHei',sans-serif"
          font-size="11" fill="rgba(255,255,255,0.45)">ATS 友好度</text>
    <rect x="0" y="164" width="222" height="4" rx="2" fill="rgba(255,255,255,0.08)"/>
    <rect x="0" y="164" width="178" height="4" rx="2" fill="#818cf8" opacity="0.8"/>
  </g>
</svg>
